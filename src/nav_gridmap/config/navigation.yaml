# ===========================================================================
# Parametros de la navegacion completa (Parte B, Sistema 1: grilla pura).
# Carga dos nodos: mcl_localization (localizacion) y navigator (FSM).
# Se usa con: ros2 launch nav_gridmap navigation.launch.py
# ===========================================================================

mcl_localization:
  ros__parameters:
    use_sim_time: true
    robot_type: "tb3"
    map_yaml: ""                    # lo completa el launch
    num_particles: 500
    alpha: [0.05, 0.05, 0.05, 0.05]
    neff_ratio: 0.5
    seed: 1
    sigma_hit: 0.20
    z_hit: 0.85
    z_rand: 0.15
    alpha_slow: 0.001
    alpha_fast: 0.10
    init_std_xy: 0.30
    init_std_theta: 0.25
    global_init: false
    scan_subsample: 6
    max_range: 0.0
    keyframe_dist: 0.10
    keyframe_angle: 0.10
    map_frame: "map"
    # odom_frame lo define robot_type:
    #   tb3 sim -> calc_odom
    #   tb4 real -> odom
    # odom_frame: "calc_odom"
    transform_tolerance: 0.1
    publish_map: true

navigator:
  ros__parameters:
    use_sim_time: true
    robot_type: "tb3"
    map_yaml: ""                    # lo completa el launch

    # --- planificador (A* con inflado) ---
    robot_radius: 0.17              # radio efectivo con margen [m] (burger ~0.105)
    inflation_radius: 0.45          # hasta aca penaliza acercarse a paredes [m]
    inflation_cost: 12.0            # cuanto penaliza (rutas mas centradas)
    simplify_path: false            # evita que el suavizado corte esquinas

    # --- seguimiento (pure pursuit) ---
    lookahead: 0.25                 # distancia del punto de mira [m]
    v_max: 0.16                     # velocidad lineal max [m/s] (burger)
    w_max: 2.5                      # velocidad angular max [rad/s]
    goal_tol: 0.11                  # tolerancia de POSICION [m]
    yaw_tol: 0.10                   # tolerancia de ANGULO final [rad] (~5.7 deg)
    slow_radius: 0.45               # distancia para empezar a frenar [m]

    # --- evasion de obstaculos no mapeados ---
    stop_distance: 0.25             # frenado de emergencia al frente [m]
    obstacle_check_period: 0.2      # cada cuanto revisar el LIDAR [s]
    dynamic_ttl: 4.0                # vida de un obstaculo dinamico marcado [s]
    dynamic_inflate_cells: 1        # margen extra alrededor de obstaculos nuevos
    replan_cooldown: 2.0            # tiempo minimo entre re-planificaciones [s]
    wall_tol: 0.55                  # margen para no confundir pared con obstaculo [m]
    obstacle_confirmations: 3       # detecciones seguidas antes de replan no urgente
    clear_dynamic_on_new_goal: true # cada goal releva de nuevo los obstaculos

    # --- recuperacion ante atasco ---
    stuck_timeout: 8.0              # si no mejora en este tiempo, recupera [s]
    stuck_min_progress: 0.08        # mejora minima esperada hacia el goal [m]
    recovery_time: 1.6              # giro corto antes de re-planificar [s]
    recovery_w: 0.7                 # velocidad angular de recuperacion [rad/s]
    max_recoveries: 3               # tras esto, espera un goal nuevo

    # --- general ---
    control_rate: 20.0              # Hz del bucle de control
    map_frame: "map"
    # base_frame lo define robot_type:
    #   tb3 sim -> calc_base_footprint
    #   tb4 real -> base_link
    # base_frame: "calc_base_footprint"
    max_range: 0.0
    tf_timeout: 0.2
